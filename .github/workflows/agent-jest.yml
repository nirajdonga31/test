name: agent-jest

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  trigger-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger OpenClaw in Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONTENT: >-
            <@1480911709358002277> Please generate Jest tests for PR #${{ github.event.pull_request.number }} in repo ${{ github.repository }}.
            Use the runbook at openclaw/skills/gen-tests/SKILL.md.
            Save the generated tests on the server under tester/autotests/run-${{ github.run_id }}/files/.
            IMPORTANT: Reply in Discord with ONLY a short summary (list file paths + counts). Do NOT paste full test contents in Discord.
            Run link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}.
        run: node .github/scripts/send-discord-webhook.js
        shell: bash
