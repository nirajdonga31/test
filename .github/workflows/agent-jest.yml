name: agent-jest

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  trigger-openclaw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger OpenClaw in Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONTENT: >-
            <@1480911709358002277> Please generate Jest tests for PR #${{ github.event.pull_request.number }} in repo ${{ github.repository }}.
            Workdir (pwd): /root/.openclaw/workspace/tester
            Runbook (absolute): /root/.openclaw/workspace/tester/openclaw/skills/gen-tests/SKILL.md
            Context script: /root/.openclaw/workspace/tester/openclaw/skills/gen-tests/run.sh
            Generator runner: OPENCLAW_GATEWAY_URL=http://10.10.10.163:18789 node /root/.openclaw/workspace/tester/openclaw/skills/gen-tests/agent-runner.js --repo ${{ github.repository }} --pr ${{ github.event.pull_request.number }} --run_id ${{ github.run_id }} --run_url https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Save the generated tests on the server under /root/.openclaw/workspace/tester/autotests/run-${{ github.run_id }}/files/.
            IMPORTANT: Reply in Discord with ONLY a short summary (list file paths + counts). Do NOT paste full test contents in Discord.
            Run link: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}.
        run: node .github/scripts/send-discord-webhook.js
        shell: bash
