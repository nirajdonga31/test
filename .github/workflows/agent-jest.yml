name: agent-jest

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-and-test:
    runs-on: ubuntu-latest
    env:
      AGENT_GENERATOR_MODE: api
      AGENT_API_URL: ${{ secrets.AGENT_API_URL }}
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tool deps
        working-directory: .agent-jest
        run: npm ci

      - name: Build tool
        working-directory: .agent-jest
        run: npm run build

      - name: Build initial context
        working-directory: .agent-jest
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npm run context:build -- --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA"

      - name: Generate tests (external API)
        working-directory: .agent-jest
        run: npm run agent:generate

      - name: Validate generated tests
        working-directory: .agent-jest
        run: npm run validate:generated

      - name: Prepare isolated workspace
        working-directory: .agent-jest
        run: npm run prepare:workspace

      - name: Apply generated tests to isolated workspace
        working-directory: .agent-jest
        run: npm run apply:generated

      - name: Install app dependencies in isolated workspace
        run: |
          cd .agent-jest/artifacts/workspace
          npm install

      - name: Run generated Jest tests
        working-directory: .agent-jest
        run: npm run jest:generated

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-jest-artifacts
          path: |
            .agent-jest/artifacts/context
            .agent-jest/artifacts/generated
            .agent-jest/artifacts/jest

      - name: Comment latest result on PR
        working-directory: .agent-jest
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npm run pr:comment
